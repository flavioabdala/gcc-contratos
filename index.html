<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pelada RF7 | Gestão Financeira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <section id="login-view" class="view center-view">
      <div class="card login-card">
        <h1>Pelada RF7</h1>
        <p class="muted">Gestão financeira completa</p>
        <form id="login-form" class="grid-form">
          <label>Email <input type="email" id="login-email" required /></label>
          <label>Senha <input type="password" id="login-password" required /></label>
          <button type="submit" class="btn primary">Entrar</button>
        </form>
        <div class="auth-links">
          <button id="open-register" type="button" class="link-btn">Criar conta</button>
        </div>
        <p id="login-message" class="message"></p>
      </div>
    </section>

    <section id="register-view" class="view center-view hidden">
      <div class="card login-card">
        <h1>Criar conta</h1>
        <form id="register-form" class="grid-form">
          <label>Nome <input type="text" id="register-name" required /></label>
          <label>Email <input type="email" id="register-email" required /></label>
          <label>Senha <input type="password" id="register-password" required minlength="6" /></label>
          <button type="submit" class="btn primary">Cadastrar</button>
        </form>
        <div class="auth-links">
          <button id="back-to-login" type="button" class="link-btn">Voltar para login</button>
        </div>
        <p id="register-message" class="message"></p>
      </div>
    </section>

    <section id="main-view" class="view hidden">
      <header class="topbar">
        <div>
          <h2>Painel Financeiro RF7</h2>
          <p id="user-badge" class="muted"></p>
        </div>
        <div class="row gap-sm">
          <button id="refresh-data" class="btn">Atualizar</button>
          <button id="logout-btn" class="btn danger">Sair</button>
        </div>
      </header>

      <nav class="tabs" id="tabs"></nav>

      <main class="content">
        <section id="sec-dashboard" class="panel"></section>

        <section id="sec-atletas" class="panel hidden">
          <h3>Gestão de Atletas</h3>
          <form id="ath-form" class="grid-form">
            <label>Nome <input type="text" id="ath-nome" required /></label>
            <label>Categoria
              <select id="ath-cat">
                <option value="linha">Jogador de Linha</option>
                <option value="goleiro_pagante">Goleiro (Pagante)</option>
                <option value="goleiro_isento">Goleiro (Isento)</option>
              </select>
            </label>
            <label>Status
              <select id="ath-status">
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
              </select>
            </label>
            <button type="submit" class="btn primary">Salvar</button>
          </form>
          <div id="atletas-list" class="table-wrap"></div>
        </section>

        <section id="sec-transacoes" class="panel hidden">
          <h3>Transações e Mensalidades</h3>
          <div class="grid-2">
            <article class="card panel">
              <h4>1. Gerar Débitos (Mês)</h4>
              <input type="month" id="gen-month">
              <button id="btn-gerar-mes" class="btn primary">Gerar para Ativos</button>
            </article>

            <article class="card panel">
              <h4>2. Registrar Pagamento / Entrada</h4>
              <form id="pay-form" class="grid-form">
                <label>Atleta <select id="pay-ath" required></select></label>
                <label>Tesoureiro <select id="pay-tes" required></select></label>
                <label>Mês <input type="month" id="pay-month" required></label>
                <label>Valor R$ <input type="number" id="pay-val" step="0.01" required></label>
                <button type="submit" class="btn primary">Baixar</button>
              </form>
            </article>
          </div>
          <div id="transacoes-list" class="table-wrap" style="margin-top:20px"></div>
        </section>

        <section id="sec-penalidades" class="panel hidden">
          <h3>Lançar Penalidades</h3>
          <form id="pen-form" class="grid-form">
            <label>Atleta <select id="p-ath" required></select></label>
            <label>Tesoureiro <select id="p-tes" required></select></label>
            <label>Tipo
              <select id="p-type">
                <option value="atraso_leve">Atraso Leve (R$ 2)</option>
                <option value="atraso_grave">Atraso Grave (R$ 5)</option>
                <option value="falta">Falta (R$ 10)</option>
                <option value="amarelo">Cartão Amarelo (R$ 2)</option>
                <option value="vermelho">Cartão Vermelho (R$ 10)</option>
              </select>
            </label>
            <button type="submit" class="btn primary">Aplicar Multa (Débito)</button>
          </form>
        </section>

        <section id="sec-peladas" class="panel hidden">
          <h3>Lançamento de Pelada</h3>
          <div class="card panel" style="padding: 20px;">
            <label>Tesoureiro Responsável <select id="pel-tes" class="input-field" style="margin-bottom:15px"></select></label>
            <button id="btn-lancar-pelada" class="btn primary" style="width:100%; padding:15px">Registrar Saídas (Aluguel + Juiz)</button>
          </div>
        </section>

        <section id="sec-relatorios" class="panel hidden"></section>

        <section id="sec-configuracoes" class="panel hidden">
          <h3>Configurações de Valores</h3>
          <form id="config-form" class="grid-form">
            <label>Mensalidade Linha <input type="number" id="cfg-lin" step="0.01" /></label>
            <label>Mensalidade Goleiro <input type="number" id="cfg-gol" step="0.01" /></label>
            <label>Aluguel Pelada <input type="number" id="cfg-pel" step="0.01" /></label>
            <label>Juiz (Gilberto) <input type="number" id="cfg-juiz" step="0.01" /></label>
            <label>Tesoureiros (Vírgula) <input type="text" id="cfg-tes" /></label>
            <button type="submit" class="btn primary">Salvar</button>
          </form>
        </section>
      </main>
    </section>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
